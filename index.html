<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoPrizes Pro Max | Premium Rewards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #000;
            color: #fff;
        }

        .premium-card {
            background: linear-gradient(145deg, #0f0f0f, #050505);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        .premium-card:hover {
            border-color: #3b82f6;
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.15);
        }

        .img-container {
            position: relative;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
        }

        .btn-glow {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }

        .btn-glow:hover {
            box-shadow: 0 0 25px rgba(37, 99, 235, 0.6);
            transform: scale(1.02);
        }

        .modal { display: none; }
        .modal.active { display: flex; }
    </style>
</head>
<body>

    <nav class="fixed w-full top-0 z-[100] bg-black/80 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                    <i class="fa-solid fa-bolt text-white"></i>
                </div>
                <span class="text-xl font-extrabold tracking-tighter">NEOPRIZES <span class="text-blue-500 italic">PRO</span></span>
            </div>
            <button onclick="openLogin()" class="btn-glow text-white px-7 py-2.5 rounded-xl font-bold transition-all">Login</button>
        </div>
    </nav>

    <section class="pt-32 pb-20 px-6 max-w-7xl mx-auto">
        <div class="text-center mb-16">
            <h1 class="text-5xl md:text-6xl font-extrabold mb-4 tracking-tight text-white">Select Your <span class="text-blue-500">Reward</span></h1>
            <p class="text-gray-500 text-lg">Real images, real rewards, delivered instantly.</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <div class="premium-card p-8 rounded-[2.5rem] flex flex-col">
                <div class="img-container rounded-2xl p-6 mb-6 flex justify-center">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" class="h-16 w-auto object-contain" alt="PayPal">
                </div>
                <h3 class="text-2xl font-bold text-white text-center">PayPal $5 USD</h3>
                <p class="text-blue-500 font-bold text-center mb-8 text-lg">500 Points</p>
                <button onclick="handleRedeem()" class="w-full py-4 rounded-2xl bg-white/5 border border-white/10 font-bold hover:bg-white/10 transition">Redeem Now</button>
            </div>

            <div class="premium-card p-8 rounded-[2.5rem] flex flex-col">
                <div class="img-container rounded-2xl p-6 mb-6 flex justify-center">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/ca/Walmart_logo.svg" class="h-16 w-auto object-contain" alt="Walmart">
                </div>
                <h3 class="text-2xl font-bold text-white text-center">$10 Walmart Card</h3>
                <p class="text-blue-500 font-bold text-center mb-8 text-lg">1,000 Points</p>
                <button onclick="handleRedeem()" class="w-full py-4 rounded-2xl bg-white/5 border border-white/10 font-bold hover:bg-white/10 transition">Redeem Now</button>
            </div>

            <div class="premium-card p-8 rounded-[2.5rem] flex flex-col">
                <div class="img-container rounded-2xl p-6 mb-6 flex justify-center">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" class="h-16 w-auto object-contain invert" alt="Roblox">
                </div>
                <h3 class="text-2xl font-bold text-white text-center">Roblox $10 Card</h3>
                <p class="text-blue-500 font-bold text-center mb-8 text-lg">1,000 Points</p>
                <button onclick="handleRedeem()" class="w-full py-4 rounded-2xl bg-white/5 border border-white/10 font-bold hover:bg-white/10 transition">Redeem Now</button>
            </div>

            <div class="premium-card p-8 rounded-[2.5rem] flex flex-col">
                <div class="img-container rounded-2xl p-6 mb-6 flex justify-center">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" class="h-16 w-auto object-contain" alt="PayPal">
                </div>
                <h3 class="text-2xl font-bold text-white text-center">PayPal $10 USD</h3>
                <p class="text-blue-500 font-bold text-center mb-8 text-lg">1,000 Points</p>
                <button onclick="handleRedeem()" class="w-full py-4 rounded-2xl bg-white/5 border border-white/10 font-bold hover:bg-white/10 transition">Redeem Now</button>
            </div>

            <div class="premium-card p-8 rounded-[2.5rem] flex flex-col">
                <div class="img-container rounded-2xl p-6 mb-6 flex justify-center">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/7/7c/Fortnite_F_lettermark_logo.png" class="h-16 w-auto object-contain" alt="Fortnite">
                </div>
                <h3 class="text-2xl font-bold text-white text-center">1000 V-Bucks</h3>
                <p class="text-blue-500 font-bold text-center mb-8 text-lg">1,200 Points</p>
                <button onclick="handleRedeem()" class="w-full py-4 rounded-2xl bg-white/5 border border-white/10 font-bold hover:bg-white/10 transition">Redeem Now</button>
            </div>

        </div>
    </section>

    <div id="loginModal" class="modal fixed inset-0 z-[200] items-center justify-center bg-black/90 backdrop-blur-md p-4">
        <div class="bg-[#0a0a0a] w-full max-w-md rounded-[2.5rem] p-10 border border-white/10 relative shadow-2xl">
            <button onclick="closeLogin()" class="absolute top-8 right-8 text-gray-500 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            
            <h2 class="text-3xl font-bold text-center mb-8">Access Pro Panel</h2>
            
            <div class="space-y-4">
                <button onclick="mockLogin()" class="w-full flex items-center justify-center gap-3 bg-white text-black py-4 rounded-2xl font-bold text-lg">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-6 h-6">
                    Sign in with Google
                </button>
                
                <div class="py-4 flex items-center"><div class="flex-grow border-t border-white/10"></div><span class="px-4 text-xs text-gray-500 uppercase">or</span><div class="flex-grow border-t border-white/10"></div></div>

                <input type="email" placeholder="Email Address" class="w-full bg-white/5 border border-white/10 py-4 px-6 rounded-2xl outline-none focus:border-blue-500 transition">
                <button onclick="mockLogin()" class="w-full btn-glow text-white py-4 rounded-2xl font-bold text-lg">Sign In</button>
            </div>
        </div>
    </div>

    <script>
        let isLoggedIn = false;

        function openLogin() {
            document.getElementById('loginModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLogin() {
            document.getElementById('loginModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function mockLogin() {
            isLoggedIn = true;
            alert("Success: Logged in as Admin.");
            closeLogin();
        }

        function handleRedeem() {
            if (!isLoggedIn) {
                alert("Restricted: You must login to access rewards.");
                openLogin();
            } else {
                alert("Processing points... Success!");
            }
        }
    </script>
</body>
</html>
