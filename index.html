<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoPrizes Pro Max | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }

        .premium-border {
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(15px);
        }

        .neon-text {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-main {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(37, 99, 235, 0.5);
        }

        .reward-card {
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s ease;
        }

        .reward-card:hover {
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.02);
            transform: scale(1.02);
        }

        .modal { display: none; }
        .modal.active { display: flex; }
    </style>
</head>
<body>

    <nav class="fixed w-full top-0 z-[100] border-b border-white/5 bg-black/80 backdrop-blur-lg">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-crown text-blue-500 text-2xl"></i>
                <span class="text-2xl font-bold tracking-tighter">NEOPRIZES <span class="text-blue-500">PRO</span></span>
            </div>
            <div class="flex gap-4">
                <button onclick="openLogin()" class="font-bold text-gray-400 hover:text-white px-4">Login</button>
                <button onclick="openLogin()" class="btn-main px-6 py-2.5 rounded-xl font-bold">Join Now</button>
            </div>
        </div>
    </nav>

    <section class="pt-40 pb-20 px-6 text-center">
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight">Level Up Your <br><span class="neon-text">Earnings</span></h1>
        <p class="text-gray-400 text-lg md:text-xl max-w-2xl mx-auto mb-12">The most advanced rewards platform. Instant payouts, premium gift cards, and pro-level security.</p>
    </section>

    <section class="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-8 pb-32">
        
        <div class="reward-card p-10 rounded-[2rem] text-center">
            <div class="text-blue-500 text-5xl mb-6"><i class="fa-brands fa-paypal"></i></div>
            <h3 class="text-2xl font-bold mb-2">PayPal $5 USD</h3>
            <p class="text-gray-500 font-bold mb-8">500 Points</p>
            <button onclick="handleRedeem()" class="w-full py-4 rounded-2xl bg-white/5 border border-white/10 font-bold hover:bg-white/10 transition">Redeem Reward</button>
        </div>

        <div class="reward-card p-10 rounded-[2rem] text-center">
            <div class="text-yellow-500 text-5xl mb-6"><i class="fa-solid fa-cart-shopping"></i></div>
            <h3 class="text-2xl font-bold mb-2">$10 Walmart Card</h3>
            <p class="text-gray-500 font-bold mb-8">1,000 Points</p>
            <button onclick="handleRedeem()" class="w-full py-4 rounded-2xl bg-white/5 border border-white/10 font-bold hover:bg-white/10 transition">Redeem Reward</button>
        </div>

        <div class="reward-card p-10 rounded-[2rem] text-center">
            <div class="text-gray-300 text-5xl mb-6"><i class="fa-solid fa-cube"></i></div>
            <h3 class="text-2xl font-bold mb-2">Roblox $10 Card</h3>
            <p class="text-gray-500 font-bold mb-8">1,000 Points</p>
            <button onclick="handleRedeem()" class="w-full py-4 rounded-2xl bg-white/5 border border-white/10 font-bold hover:bg-white/10 transition">Redeem Reward</button>
        </div>

    </section>

    <div id="loginModal" class="modal fixed inset-0 z-[200] items-center justify-center bg-black/90 backdrop-blur-md p-4">
        <div class="bg-[#0f0f0f] w-full max-w-md rounded-[2.5rem] p-10 border border-white/10 shadow-2xl relative">
            <button onclick="closeLogin()" class="absolute top-8 right-8 text-gray-500 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            
            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-blue-600/20 text-blue-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-shield-halved text-2xl"></i>
                </div>
                <h2 class="text-3xl font-bold">Secure Login</h2>
                <p class="text-gray-500 mt-2">Sign in to sync your points</p>
            </div>

            <div class="space-y-4">
                <button onclick="mockLogin()" class="w-full flex items-center justify-center gap-3 bg-white text-black py-4 rounded-2xl font-bold text-lg hover:bg-gray-200 transition">
                    <svg class="w-6 h-6" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"></path><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"></path><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"></path><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571l6.19,5.238C40.483,35.58,44,30.222,44,24C44,22.659,43.862,21.35,43.611,20.083z"></path></svg>
                    Continue with Google
                </button>
                
                <div class="relative py-4">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
                    <div class="relative flex justify-center text-xs uppercase"><span class="bg-[#0f0f0f] px-2 text-gray-500">Or use email</span></div>
                </div>

                <input type="email" placeholder="Email Address" class="w-full bg-white/5 border border-white/10 py-4 px-6 rounded-2xl outline-none focus:border-blue-500 transition">
                <button onclick="mockLogin()" class="w-full py-4 rounded-2xl bg-gray-800 font-bold hover:bg-gray-700 transition">Sign In</button>
            </div>
        </div>
    </div>

    <script>
        let isLoggedIn = false;

        function openLogin() {
            document.getElementById('loginModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLogin() {
            document.getElementById('loginModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function mockLogin() {
            isLoggedIn = true;
            alert("Login Successful! You can now redeem rewards.");
            closeLogin();
        }

        function handleRedeem() {
            if (!isLoggedIn) {
                alert("Access Denied: Please Login first to redeem points.");
                openLogin();
            } else {
                alert("Point processing... Please wait 24 hours for verification.");
            }
        }
    </script>
</body>
</html>
